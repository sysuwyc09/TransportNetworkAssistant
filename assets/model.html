<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <script type="text/javascript" src="http://api.map.baidu.com/api?v=2.0&ak=uYwaDqB9VFIaMLLIr7ry83Qnks9C6P5Z"></script>
    <script type="text/javascript" src="http://api.map.baidu.com/library/Heatmap/2.0/src/Heatmap_min.js"></script>
    <script type="text/javascript" src="http://api.map.baidu.com/library/TextIconOverlay/1.2/src/TextIconOverlay_min.js"></script>    
    <script type="text/javascript" src="http://api.map.baidu.com/library/MarkerClusterer/1.2/src/MarkerClusterer_min.js"></script>
    <title>**热力图示例</title>
    <style type="text/css">
        ul,li{list-style: none;margin:0;padding:0;float:left;}
        html{height:100%}
        body{height:100%;margin:0px;padding:0px;font-family:"微软雅黑";}
        #container{height:90%;width:100%;}
        #r-result{width:100%;}
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="r-result">
        <input type="button"  onclick="openHeatmap();" value="显示热力图"/><input type="button"  onclick="closeHeatmap();" value="关闭热力图"/><input type="button"  onclick="add_overlay();" value="显示网格"/><input type="button"  onclick="remove_overlay();" value="隐藏网格"/><input type="button"  onclick="openHouses();" value="显示标记"/><input type="button"  onclick="closeHouses();" value="隐藏标记"/>
    </div>
</body>
</html>
<script type="text/javascript">
    var map = new BMap.Map("container");          // 创建地图实例
    var point = new BMap.Point(midPoint);
    map.centerAndZoom(point, 13);             // 初始化地图，设置中心点坐标和地图级别
    map.enableScrollWheelZoom(); // 允许滚轮缩放

    //用户数热点
    var points =[userPointStr];
    //业务区轮廓
    var polygon = new BMap.Polygon([AreaCoord], {strokeColor:"blue", strokeWeight:5, strokeOpacity:0.5,fillOpacity:0.1});
    var houses = [pointStr];
    if(!isSupportCanvas()){
        alert('热力图目前只支持有canvas支持的浏览器,您所使用的浏览器不能使用热力图功能~')
    }
    //详细的参数,可以查看heatmap.js的文档 https://github.com/pa7/heatmap.js/blob/master/README.md
    //参数说明如下:
    /* visible 热力图是否显示,默认为true
     * opacity 热力的透明度,1-100
     * radius 势力图的每个点的半径大小
     * gradient  {JSON} 热力图的渐变区间 . gradient如下所示
     *  {
            .2:'rgb(0, 255, 255)',
            .5:'rgb(0, 110, 255)',
            .8:'rgb(100, 0, 255)'
        }
        其中 key 表示插值的位置, 0~1.
            value 为颜色值.
     */
    heatmapOverlay = new BMapLib.HeatmapOverlay({"radius":radiusStr});
    map.addOverlay(heatmapOverlay);
    heatmapOverlay.setDataSet({data:points,max:100});
    map.addOverlay(polygon); 
    //是否显示热力图
    function openHeatmap(){
        heatmapOverlay.show();
    }
    function closeHeatmap(){
        heatmapOverlay.hide();
    }
    // closeHeatmap();
    function setGradient(){
        /*格式如下所示:
        {
            0:'rgb(102, 255, 0)',
            .5:'rgb(255, 170, 0)',
            1:'rgb(255, 0, 0)'
        }*/
        var gradient = {};
        var colors = document.querySelectorAll("input[type='color']");
        colors = [].slice.call(colors,0);
        colors.forEach(function(ele){
            gradient[ele.getAttribute("data-key")] = ele.value;
        });
        heatmapOverlay.setOptions({"gradient":gradient});
    }
    //判断浏览区是否支持canvas
    function isSupportCanvas(){
        var elem = document.createElement('canvas');
        return !!(elem.getContext && elem.getContext('2d'));
    }

    //添加业务区边界
    function add_overlay(){
        polygon.show();          //增加多边形

    }
    //添加业务区边界
    function remove_overlay(){
        polygon.hide();         
    }

    var markers = []
    var pt = null;
    var i = 0;
    for (; i < houses.length; i++) {
       var pt = new BMap.Point(houses[i].lng, houses[i].lat);
       var marker = new BMap.Marker(pt);
        // 点标记添加点击事件
        // marker.addEventListener('click', (function (i) {
        //     return function(){
        //     map.openInfoWindow(infoWindow, pt); // 开启信息窗口
        //     }
        // }(i)));
        marker.onclick = (function (i) {
            var pt = new BMap.Point(houses[i].lng, houses[i].lat);
            var opts = {
                width: 400,
                height: 200,
                title: houses[i].name
            };
            var info = '<br/>备注：' + houses[i].description
            var infoWindow = new BMap.InfoWindow(info, opts);
            return function(){
            map.openInfoWindow(infoWindow, pt); // 开启信息窗口
            }
        }(i))
       markers.push(marker);
    }
    //最简单的用法，生成一个marker数组，然后调用markerClusterer类即可。
    
    var markerClusterer= new BMapLib.MarkerClusterer(map, {markers:[]})
    markerClusterer= new BMapLib.MarkerClusterer(map, {markers:markers})
    // 显示机房图标
    function openHouses(){
        markerClusterer= new BMapLib.MarkerClusterer(map, {markers:markers})        
    }    
    // 隐藏机房图标
    function closeHouses(){
        markerClusterer.clearMarkers(); 
                  
    }    




</script>
